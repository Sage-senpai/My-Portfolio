<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9B5DE5"/>
      <stop offset="100%" stop-color="#E6007A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Hexagonal frame -->
  <path d="M256 28 L460 144 L460 368 L256 484 L52 368 L52 144 Z"
        fill="none" stroke="url(#g)" stroke-width="6" opacity="0.25"/>

  <!-- Geometric D — faceted outer -->
  <path d="M152 108 L296 108 L356 132 L396 180 L412 248 L412 272
           L396 340 L356 386 L296 410 L152 410 Z
           M200 160 L200 358 L280 358 L322 340 L348 304 L356 260
           L356 248 L348 208 L322 172 L280 160 Z"
        fill="url(#g)" fill-rule="evenodd"/>

  <!-- Circuit nodes at vertices -->
  <circle cx="296" cy="108" r="7" fill="#fff" opacity="0.85" filter="url(#glow)"/>
  <circle cx="412" cy="260" r="7" fill="#fff" opacity="0.85" filter="url(#glow)"/>
  <circle cx="296" cy="410" r="5" fill="#fff" opacity="0.5"/>
  <circle cx="152" cy="108" r="5" fill="#fff" opacity="0.5"/>

  <!-- Circuit traces -->
  <line x1="296" y1="108" x2="340" y2="80" stroke="#9B5DE5" stroke-width="2" opacity="0.4"/>
  <circle cx="340" cy="80" r="3" fill="#9B5DE5" opacity="0.5"/>
  <line x1="412" y1="260" x2="448" y2="260" stroke="#E6007A" stroke-width="2" opacity="0.4"/>
  <circle cx="448" cy="260" r="3" fill="#E6007A" opacity="0.5"/>

  <!-- Inner blockchain block detail -->
  <rect x="232" y="232" width="28" height="28" rx="3" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.2"/>
  <rect x="238" y="238" width="16" height="16" rx="2" fill="#fff" opacity="0.08"/>
</svg>
